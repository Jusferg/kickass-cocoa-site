<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Received | Kick-Ass Cocoa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

<section class="auth-page">
  <div class="auth-container">
    <div class="auth-card">

      <h1 class="auth-title">You're in! 🎉</h1>

      <p class="auth-subtitle">
        Your registration was received.  
        You can now log in to access the community dashboard.
      </p>

      <div class="auth-actions">
        <a class="btn primary-btn" href="login.html">Continue to Login</a>
        <a class="btn secondary-btn-dark" href="index.html">Back Home</a>
      </div>

    </div>
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const email = localStorage.getItem("kac_last_register_email");
  const firstName = localStorage.getItem("kac_last_register_first") || "";
  const lastName = localStorage.getItem("kac_last_register_last") || "";

  if (email) {
    // Create a lightweight session (prototype auth)
    localStorage.setItem("loggedInUser", JSON.stringify({
      email,
      role: "member",
      firstName,
      lastName,
      loggedAt: new Date().toISOString()
    }));

    // cleanup
    localStorage.removeItem("kac_last_register_email");
    localStorage.removeItem("kac_last_register_first");
    localStorage.removeItem("kac_last_register_last");

    // Go straight to the dashboard
    window.location.href = "members-area.html";
  }
});
</script>

</body>
</html>
