<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Received | Kick-Ass Cocoa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
    
<header class="kac-header">
  <nav class="kac-nav" aria-label="Primary">
    <a class="kac-logo" href="members-area.html">
      <img class="kac-logo-img" src="images/kac-logo.jpg" alt="Kick-Ass Cocoa">
    </a>

    <button class="kac-burger" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="kac-menu" id="kacMenu">
      <a class="kac-link is-active" href="members-area.html">Dashboard</a>
      <a class="kac-link" href="wins.html">Submit a Win</a>

      <!-- Avatar menu (logged-in) -->
      <div class="member-nav">
        <button id="memberAvatarBtn" class="member-avatar" type="button" aria-label="Open member menu">
          <span id="memberInitials">?</span>
        </button>

        <div class="member-dropdown" id="memberDropdown">
          <a href="members-area.html">Dashboard</a>
          <a href="account.html" class="is-active" aria-current="page">My Account</a>
          <a href="wins.html">Submit a Win</a>
          <a href="#" id="logoutBtn">Logout</a>
        </div>
      </div>
    </div>
  </nav>
</header>

<section class="account-page">
  <div class="account-container">

    <h1 class="account-title">My Account</h1>
    <p class="account-subtitle">
      Update how you appear in the community.
    </p>

    <div class="account-card">

      <!-- Avatar Preview -->
      <div class="account-avatar">
        <div id="avatarPreview" class="avatar-circle">TF</div>
      </div>

      <form id="accountForm">
        <label for="displayName">Display name</label>
        <input id="displayName" type="text" placeholder="Tia Ferguson" />

        <label for="avatarUrl">Profile image URL</label>
        <input id="avatarUrl" type="url" placeholder="Paste an image link (https://...)" />

        <div id="avatarPreview" class="avatar-circle">TF</div>

        <button class="btn primary-btn" type="submit">Save</button>
        <p id="accountStatus" class="account-status"></p>
        </form>

    </div>
  </div>
</section>

<script src="js/core.js" defer></script>
<script src="js/account.js" defer></script>

</body>
</html>
